<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1a1428"/>
      <stop offset="55%" stop-color="#0c0a12"/>
      <stop offset="100%" stop-color="#040406"/>
    </radialGradient>
    <radialGradient id="disc" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#2a2232"/>
      <stop offset="60%" stop-color="#120e18"/>
      <stop offset="100%" stop-color="#080608"/>
    </radialGradient>
    <radialGradient id="label" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#c3a9ec"/>
      <stop offset="45%" stop-color="#9a7fd6"/>
      <stop offset="100%" stop-color="#5e4593"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="55%" stop-color="#9a7fd6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9a7fd6" stop-opacity="0.22"/>
    </radialGradient>
    <linearGradient id="specular" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="discMask">
      <circle cx="512" cy="512" r="380" fill="white"/>
    </mask>
  </defs>

  <!-- Rounded-square background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Ambient purple glow around the disc -->
  <circle cx="512" cy="512" r="460" fill="url(#glow)"/>

  <!-- Vinyl disc -->
  <circle cx="512" cy="512" r="380" fill="url(#disc)"/>

  <!-- Concentric groove rings, clipped to disc -->
  <g mask="url(#discMask)" stroke="#241a30" stroke-width="1.3" fill="none" opacity="0.55">
    <circle cx="512" cy="512" r="358"/>
    <circle cx="512" cy="512" r="342"/>
    <circle cx="512" cy="512" r="326"/>
    <circle cx="512" cy="512" r="310"/>
    <circle cx="512" cy="512" r="294"/>
    <circle cx="512" cy="512" r="278"/>
    <circle cx="512" cy="512" r="262"/>
    <circle cx="512" cy="512" r="246"/>
    <circle cx="512" cy="512" r="230"/>
    <circle cx="512" cy="512" r="214"/>
    <circle cx="512" cy="512" r="198"/>
    <circle cx="512" cy="512" r="182"/>
    <circle cx="512" cy="512" r="166"/>
  </g>

  <!-- Top-edge specular highlight for 3D depth -->
  <g mask="url(#discMask)">
    <rect x="132" y="132" width="760" height="340" fill="url(#specular)"/>
  </g>

  <!-- Heritage Purple center label -->
  <circle cx="512" cy="512" r="132" fill="url(#label)"/>

  <!-- Subtle label rim shadow -->
  <circle cx="512" cy="512" r="132" fill="none"
          stroke="#2a1d40" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Center pinhole -->
  <circle cx="512" cy="512" r="14" fill="#050406"/>
</svg>
